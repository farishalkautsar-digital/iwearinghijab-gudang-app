<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>IWearingHijab - Gudang V1.0</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap5.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .brand-color { background-color: #d81b60; color: white; }
    .brand-color:hover { background-color: #ad144b; color: white; }
    .text-brand { color: #d81b60; }
    
    #login-section { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%); }
    .login-card { width: 400px; padding: 40px; border-radius: 15px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    
    #app-section { display: none; min-height: 100vh; flex-direction: row; }
    .sidebar { width: 250px; background: #fff; box-shadow: 2px 0 5px rgba(0,0,0,0.05); padding-top: 20px; z-index: 10; transition: all 0.3s; }
    .sidebar .nav-link { color: #495057; padding: 15px 25px; font-weight: 500; border-left: 4px solid transparent; cursor: pointer; transition: all 0.2s; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #fce4ec; color: #d81b60; border-left: 4px solid #d81b60; }
    .main-content { flex: 1; padding: 30px; overflow-y: auto; height: 100vh; }
    
    #loader { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.8); z-index: 9999; text-align: center; padding-top: 40vh; }

    /* RESPONSIVE MOBILE */
    @media (max-width: 768px) {
      #app-section { flex-direction: column; }
      .main-content { padding: 15px; padding-bottom: 90px; height: auto; }
      .sidebar { width: 100%; height: 70px; position: fixed; bottom: 0; left: 0; padding: 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 1050; display: flex; align-items: center; }
      .sidebar .text-center { display: none; }
      .sidebar #menu-tabs { flex-direction: row !important; width: 100%; height: 100%; justify-content: space-around; margin: 0; padding: 0; align-items: center; }
      .sidebar .nav-link { padding: 8px 2px; font-size: 11px; text-align: center; border-left: none; border-top: 3px solid transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      .sidebar .nav-link i { margin: 0 0 5px 0 !important; font-size: 20px; }
      .sidebar .nav-link:hover, .sidebar .nav-link.active { border-left: none; border-top: 3px solid #d81b60; background: transparent; color: #d81b60; }
      .sidebar li.mt-5 { margin-top: 0 !important; }
      .login-card { width: 90%; padding: 25px; }
      .dt-buttons { display: flex; justify-content: center; margin-bottom: 10px; gap: 5px; }
      .dataTables_filter { text-align: center !important; margin-top: 10px; }
      .dataTables_filter input { width: 100%; margin-left: 0 !important; margin-top: 5px; }
    }
  </style>
</head>
<body>

  <div id="loader"><div class="spinner-border text-brand" style="width: 4rem; height: 4rem;" role="status"></div><h4 class="mt-3 text-secondary">Sinkronisasi Database...</h4></div>

  <div id="login-section">
    <div class="login-card">
      <div class="text-center mb-4">
        <h3 class="fw-bold text-brand">IWearingHijab</h3><p class="text-muted">Sistem Manajemen Gudang</p>
      </div>
      <form id="formLogin" onsubmit="prosesLogin(event)">
        <div class="mb-3"><label class="form-label fw-semibold">Username</label><input type="text" id="username" class="form-control form-control-lg" required></div>
        <div class="mb-4"><label class="form-label fw-semibold">Password</label><input type="password" id="password" class="form-control form-control-lg" required></div>
        <button type="submit" class="btn brand-color btn-lg w-100">Login Sistem</button>
      </form>
    </div>
  </div>

  <div id="app-section">
    <div class="sidebar">
      <div class="text-center mb-4 px-3"><h5 class="fw-bold text-brand mt-2">IWearingHijab</h5><small class="text-muted" id="user-info"></small></div>
      <ul class="nav flex-column" id="menu-tabs">
        <li><a class="nav-link active" onclick="switchTab('dashboard')"><i class="fas fa-chart-pie me-2"></i> Dashboard</a></li>
        <li><a class="nav-link" onclick="switchTab('master')"><i class="fas fa-box-open me-2"></i> Produk</a></li>
        <li><a class="nav-link" onclick="switchTab('stok')"><i class="fas fa-exchange-alt me-2"></i> Input Stok</a></li>
        <li class="mt-5"><a class="nav-link text-danger" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i> Keluar</a></li>
      </ul>
    </div>

    <div class="main-content">
      
      <div id="tab-dashboard" class="content-tab">
        <h4 class="mb-4 fw-bold">Overview Sisa Stok</h4>
        <div class="card p-3 p-md-4 border-0 shadow-sm">
          <div class="table-responsive">
            <table id="tabelDashboard" class="table table-striped table-hover w-100 align-middle">
              <thead class="table-dark"><tr><th>Kategori</th><th>Nama Produk (Warna)</th><th>Kuantitas Sisa</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>

      <div id="tab-master" class="content-tab" style="display: none;">
        <h4 class="mb-4 fw-bold">Kelola Master Produk</h4>
        <div class="card p-3 p-md-4 border-0 shadow-sm mb-4">
          <form id="formProduk" onsubmit="submitProduk(event)">
            <input type="hidden" id="edit_id_produk" value="">
            <div class="row">
              <div class="col-md-4 col-12 mb-3">
                <label class="form-label fw-semibold">Kategori</label>
                <select id="kategori" class="form-select" required>
                  <option value="">-- Pilih --</option>
                  <option value="Hijab Segi Empat">Hijab Segi Empat</option>
                  <option value="Pashmina">Pashmina</option>
                  <option value="Aksesoris/Lainnya">Aksesoris / Lainnya</option>
                </select>
              </div>
              <div class="col-md-4 col-12 mb-3"><label class="form-label fw-semibold">Nama Produk</label><input type="text" id="nama" class="form-control" placeholder="Misal: Paris Jadul" required></div>
              <div class="col-md-4 col-12 mb-3"><label class="form-label fw-semibold">Warna</label><input type="text" id="warna" class="form-control" placeholder="Sage Green" required></div>
            </div>
            <div class="d-flex flex-column flex-md-row gap-2">
              <button type="submit" class="btn brand-color w-100" id="btn-submit-produk"><i class="fas fa-save me-2"></i>Simpan Produk Baru</button>
              <button type="button" class="btn btn-secondary w-100" id="btn-batal-edit" style="display:none;" onclick="batalEdit()"><i class="fas fa-times me-2"></i>Batal Edit</button>
            </div>
          </form>
        </div>
        <div class="card p-3 p-md-4 border-0 shadow-sm">
          <div class="table-responsive">
            <table id="tabelMaster" class="table table-striped table-hover w-100 align-middle">
              <thead class="table-dark"><tr><th>ID</th><th>Kategori</th><th>Nama Produk</th><th>Warna</th><th width="100px">Aksi</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>

      <div id="tab-stok" class="content-tab" style="display: none;">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
          <h4 class="fw-bold mb-0">Catat Lalu Lintas Barang</h4>
          <button class="btn btn-success disabled w-100 w-md-auto" title="Akan hadir di pembaruan sistem berikutnya"><i class="fas fa-file-excel me-2"></i>Upload Excel Kasir</button>
        </div>
        <div class="card p-3 p-md-4 border-0 shadow-sm col-md-8">
          <form id="formLog" onsubmit="submitLog(event)">
            <div class="mb-3"><label class="form-label fw-semibold">Pilih Produk</label><select id="id_produk" class="form-select" required></select></div>
            <div class="row">
              <div class="col-md-6 col-12 mb-3">
                <label class="form-label fw-semibold">Tipe Transaksi</label>
                <select id="tipe" class="form-select" required>
                  <option value="In">Barang Masuk (In)</option><option value="Out">Barang Keluar (Out)</option><option value="Adj">Penyesuaian (Adjustment)</option>
                </select>
              </div>
              <div class="col-md-6 col-12 mb-3"><label class="form-label fw-semibold">Kuantitas</label><input type="number" id="qty" class="form-control" min="1" required></div>
            </div>
            <div class="mb-4"><label class="form-label fw-semibold">Keterangan Tambahan</label><input type="text" id="keterangan" class="form-control" placeholder="Opsional..."></div>
            <button type="submit" class="btn brand-color w-100"><i class="fas fa-check-circle me-2"></i>Proses Data Stok</button>
          </form>
        </div>
      </div>
      
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.bootstrap5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
  
  <script>
    // =================================================================
    // GANTI URL DI BAWAH INI DENGAN URL DEPLOY KAMU YANG TERBARU
    // =================================================================
    const API_URL = "https://script.google.com/macros/s/AKfycbwJAzN53VkinXr0PxRWU96imVvIVqHqyIH21LPZgklgYNkdAvfWeN9MOI1FpJpOCMFe/exec"; 
    
    let dtTable, dtMaster;

    async function callAPI(action, payload = {}) {
      try {
        const response = await fetch(`${API_URL}?action=${action}`, {
          method: 'POST',
          body: JSON.stringify(payload),
          headers: {
            'Content-Type': 'text/plain;charset=utf-8' 
          }
        });
        
        if (!response.ok) throw new Error("Jaringan bermasalah.");
        return await response.json();
      } catch (err) {
        console.error("API Error:", err);
        throw new Error('Koneksi terputus');
      }
    }

    window.onload = function() {
      const activeUser = localStorage.getItem('iw_user');
      if (activeUser) { document.getElementById('user-info').innerText = `Halo, ${activeUser}`; showApp(); }
    };

    function showLoader() { document.getElementById('loader').style.display = 'block'; }
    function hideLoader() { document.getElementById('loader').style.display = 'none'; }

    async function prosesLogin(e) {
      e.preventDefault(); showLoader();
      const data = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      };
      
      try {
        const res = await callAPI('login', data);
        hideLoader();
        if(res.status === 'success') {
          localStorage.setItem('iw_user', res.nama);
          document.getElementById('user-info').innerText = `Halo, ${res.nama}`;
          Swal.fire({ icon: 'success', title: 'Berhasil', text: `Selamat bekerja!`, timer: 1500, showConfirmButton: false });
          showApp();
        } else { Swal.fire('Ditolak', res.message, 'error'); }
      } catch(err) { hideLoader(); Swal.fire('Error', 'Gagal memanggil Server', 'error'); }
    }

    function logout() { localStorage.removeItem('iw_user'); location.reload(); }

    function switchTab(tabId) {
      document.querySelectorAll('.content-tab').forEach(t => t.style.display = 'none');
      document.querySelectorAll('.sidebar .nav-link').forEach(l => l.classList.remove('active'));
      document.getElementById(`tab-${tabId}`).style.display = 'block';
      event.currentTarget.classList.add('active');
    }

    function initDataTables() {
      if (!$.fn.DataTable.isDataTable('#tabelDashboard')) {
        dtTable = $('#tabelDashboard').DataTable({
          language: { search: "Cari Produk:", lengthMenu: "_MENU_", info: "Tampil _START_ s/d _END_ dari _TOTAL_" },
          pageLength: 15, destroy: true,
          buttons: [
            { extend: 'excelHtml5', className: 'btn btn-success btn-sm me-1', text: '<i class="fas fa-file-excel"></i> Excel', title: 'Stok IWearingHijab' },
            { extend: 'csvHtml5', className: 'btn btn-info btn-sm text-white', text: '<i class="fas fa-file-csv"></i> CSV', title: 'Stok IWearingHijab' }
          ]
        });
        dtTable.buttons().container().appendTo('#tabelDashboard_wrapper .col-md-6:eq(0)');
      }
      if (!$.fn.DataTable.isDataTable('#tabelMaster')) {
        dtMaster = $('#tabelMaster').DataTable({ language: { search: "Cari Data:", lengthMenu: "_MENU_", info: "Tampil _START_ s/d _END_ dari _TOTAL_" }, pageLength: 10, destroy: true });
      }
    }

    function showApp() {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('app-section').style.display = 'flex';
      initDataTables();
      loadDashboard(true); loadMasterProdukTable(false); loadDropdownProduk(false);
    }

    async function loadDashboard(loading = true) {
      if(loading) showLoader();
      try {
        const data = await callAPI('getDashboardData');
        if(loading) hideLoader();
        dtTable.clear(); dtTable.rows.add(data); dtTable.draw();
      } catch(e) { hideLoader(); console.error(e); }
    }

    async function loadMasterProdukTable(loading = true) {
      if(loading) showLoader();
      try {
        const data = await callAPI('getDaftarProdukTable');
        if(loading) hideLoader();
        dtMaster.clear(); dtMaster.rows.add(data); dtMaster.draw();
      } catch(e) { hideLoader(); console.error(e); }
    }

    async function submitProduk(e) {
      e.preventDefault(); showLoader();
      const idEdit = document.getElementById('edit_id_produk').value;
      const data = { 
        id: idEdit, 
        kategori: document.getElementById('kategori').value, 
        nama: document.getElementById('nama').value, 
        warna: document.getElementById('warna').value 
      };
      
      try {
        const action = idEdit === "" ? 'simpanProduk' : 'prosesEditProduk';
        const res = await callAPI(action, data);
        hideLoader();
        if(res.status === 'success') { 
          Swal.fire('Berhasil!', res.message, 'success'); 
          batalEdit(); 
          loadMasterProdukTable(false); loadDropdownProduk(false); loadDashboard(false); 
        } else { Swal.fire('Gagal!', res.message, 'error'); }
      } catch(e) { hideLoader(); Swal.fire('Error', 'Terjadi kesalahan sistem', 'error'); }
    }

    // Fungsi edit disesuaikan parameternya
    function siapkanEdit(id, kat, nama, warna) {
      document.getElementById('edit_id_produk').value = id; 
      document.getElementById('kategori').value = kat; 
      document.getElementById('nama').value = nama; 
      document.getElementById('warna').value = warna;
      const btn = document.getElementById('btn-submit-produk'); btn.innerHTML = '<i class="fas fa-save me-2"></i>Update Data'; btn.classList.replace('brand-color', 'btn-warning');
      document.getElementById('btn-batal-edit').style.display = 'block'; window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function batalEdit() {
      document.getElementById('formProduk').reset(); document.getElementById('edit_id_produk').value = "";
      const btn = document.getElementById('btn-submit-produk'); btn.innerHTML = '<i class="fas fa-save me-2"></i>Simpan Produk Baru'; btn.classList.replace('btn-warning', 'brand-color');
      document.getElementById('btn-batal-edit').style.display = 'none';
    }

    function hapusProduk(id) {
      Swal.fire({ title: 'Hapus Produk?', text: "Data hilang permanen!", icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#6c757d', confirmButtonText: 'Ya, Hapus!'
      }).then(async (result) => {
        if (result.isConfirmed) {
          showLoader();
          try {
            const res = await callAPI('prosesHapusProduk', {id: id});
            hideLoader();
            if(res.status === 'success') { 
              Swal.fire('Terhapus!', res.message, 'success'); 
              loadMasterProdukTable(false); loadDropdownProduk(false); loadDashboard(false); 
            } else { Swal.fire('Error', res.message, 'error'); }
          } catch(e) { hideLoader(); }
        }
      });
    }

    async function loadDropdownProduk(loading = true) {
      if(loading) showLoader();
      try {
        const data = await callAPI('getDaftarProduk');
        if(loading) hideLoader();
        let sel = document.getElementById('id_produk'); sel.innerHTML = '<option value="">-- Pilih --</option>';
        data.forEach(i => sel.innerHTML += `<option value="${i.id}">${i.nama}</option>`);
      } catch(e) { hideLoader(); }
    }

    async function submitLog(e) {
      e.preventDefault(); showLoader();
      const data = { 
        id_produk: document.getElementById('id_produk').value, 
        tipe: document.getElementById('tipe').value, 
        qty: document.getElementById('qty').value, 
        keterangan: document.getElementById('keterangan').value 
      };
      
      try {
        const res = await callAPI('simpanLogStok', data);
        hideLoader();
        if(res.status === 'success') { 
          Swal.fire('Tersimpan!', res.message, 'success'); 
          document.getElementById('formLog').reset(); loadDashboard(false); 
        } else { Swal.fire('Gagal!', res.message, 'error'); }
      } catch(e) { hideLoader(); Swal.fire('Error', 'Sistem gagal merespon', 'error'); }
    }
  </script>
</body>
</html>
